<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hive</title>
    <style>
      @property --bg {
        syntax: "<color>";
        inherits: true;
        initial-value: #1b1601;
      }
      @property --card {
        syntax: "<color>";
        inherits: true;
        initial-value: #0d0c06;
      }
      @property --surface {
        syntax: "<color>";
        inherits: true;
        initial-value: #231c06;
      }
      @property --border {
        syntax: "<color>";
        inherits: true;
        initial-value: #2e2508;
      }
      @property --border-rgb {
        syntax: "<number>#";
        inherits: true;
        initial-value: 58, 46, 10;
      }
      @property --accent {
        syntax: "<color>";
        inherits: true;
        initial-value: #f5b342;
      }
      @property --accent-rgb {
        syntax: "<number>#";
        inherits: true;
        initial-value: 245, 179, 66;
      }
      @property --text {
        syntax: "<color>";
        inherits: true;
        initial-value: #f5e6c8;
      }
      @property --muted {
        syntax: "<color>";
        inherits: true;
        initial-value: #8a7a5c;
      }
      @property --success {
        syntax: "<color>";
        inherits: true;
        initial-value: #7cb342;
      }
      @property --success-rgb {
        syntax: "<number>#";
        inherits: true;
        initial-value: 124, 179, 66;
      }
      @property --error {
        syntax: "<color>";
        inherits: true;
        initial-value: #d4451a;
      }
      @property --error-rgb {
        syntax: "<number>#";
        inherits: true;
        initial-value: 212, 69, 26;
      }
      @property --warning {
        syntax: "<color>";
        inherits: true;
        initial-value: #d4a017;
      }
      @property --logo-text {
        syntax: "<color>";
        inherits: true;
        initial-value: #ff0;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: monospace;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      :root,
      html.light {
        transition:
          --bg var(--duration) ease-out,
          --card var(--duration) ease-out,
          --surface var(--duration) ease-out,
          --border var(--duration) ease-out,
          --border-rgb var(--duration) ease-out,
          --accent var(--duration) ease-out,
          --accent-rgb var(--duration) ease-out,
          --text var(--duration) ease-out,
          --muted var(--duration) ease-out,
          --success var(--duration) ease-out,
          --success-rgb var(--duration) ease-out,
          --error var(--duration) ease-out,
          --error-rgb var(--duration) ease-out,
          --warning var(--duration) ease-out,
          --logo-text var(--duration) ease-out;
      }

      :root {
        --duration: 0.4s;
        --bg: #1b1601;
        --card: #0d0c06;
        --surface: #231c06;
        --border: #2e2508;
        --border-rgb: 58, 46, 10;
        --accent: #f5b342;
        --accent-rgb: 245, 179, 66;
        --text: #f5e6c8;
        --muted: #8a7a5c;
        --success: #7cb342;
        --success-rgb: 124, 179, 66;
        --error: #a44022;
        --error-rgb: 212, 69, 26;
        --warning: #6a603b;
        --logo-text: var(--accent);
      }

      html.light {
        --bg: #f5f0e3;
        --card: #fdfaef;
        --surface: #f5f0e3;
        --border: #ebe0c4;
        --border-rgb: 212, 197, 160;
        --accent: #0068b3;
        --accent-rgb: 201, 161, 0;
        --text: #2c2410;
        --muted: #8a7a5c;
        --success: #4a7c2e;
        --success-rgb: 74, 124, 46;
        --error: #b71c1c;
        --error-rgb: 183, 28, 28;
        --warning: #bd9223;
        --logo-text: #000000;
      }
    </style>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (!t)
          t = matchMedia("(prefers-color-scheme:light)").matches
            ? "light"
            : "dark";
        if (t === "light") document.documentElement.classList.add("light");
      })();
    </script>
  </head>
  <body>
    <hive-app></hive-app>
    <script type="module" src="./ui/index.ts"></script>
  </body>
</html>
