<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hive</title>
    <style>
      @property --bg {
        syntax: "<color>";
        inherits: true;
        initial-value: #0c0a00;
      }
      @property --card {
        syntax: "<color>";
        inherits: true;
        initial-value: #0d0c06;
      }
      @property --surface {
        syntax: "<color>";
        inherits: true;
        initial-value: #231c06;
      }
      @property --border {
        syntax: "<color>";
        inherits: true;
        initial-value: #45370c;
      }
      @property --accent {
        syntax: "<color>";
        inherits: true;
        initial-value: #f5b342;
      }
      @property --text {
        syntax: "<color>";
        inherits: true;
        initial-value: #f5e6c8;
      }
      @property --muted {
        syntax: "<color>";
        inherits: true;
        initial-value: #8a7a5c;
      }
      @property --success {
        syntax: "<color>";
        inherits: true;
        initial-value: #7cb342;
      }
      @property --error {
        syntax: "<color>";
        inherits: true;
        initial-value: #d4451a;
      }
      @property --warning {
        syntax: "<color>";
        inherits: true;
        initial-value: #d4a017;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: monospace;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      :root,
      html.light {
        transition:
          --bg var(--duration) ease-in-out,
          --card var(--duration) ease-in-out,
          --surface var(--duration) ease-in-out,
          --border var(--duration) ease-in-out,
          --border-rgb var(--duration) ease-in-out,
          --accent var(--duration) ease-in-out,
          --accent-rgb var(--duration) ease-in-out,
          --text var(--duration) ease-in-out,
          --muted var(--duration) ease-in-out,
          --success var(--duration) ease-in-out,
          --success-rgb var(--duration) ease-in-out,
          --error var(--duration) ease-in-out,
          --error-tgb var(--duration) ease-in-out,
          --warning var(--duration) ease-in-out,
          --logo-text var(--duration) ease-in-out;
      }

      :root {
        --duration: 0.2s;
        --bg: #0c0a00;
        --card: #0d0c06;
        --surface: #231c06;
        --border: #45370c;
        --border-rgb: 58, 46, 10;
        --accent: #f5b342;
        --accent-rgb: 245, 179, 66;
        --text: #f5e6c8;
        --muted: #8a7a5c;
        --success: #7cb342;
        --success-rgb: 124, 179, 66;
        --error: #d4451a;
        --error-rgb: 212, 69, 26;
        --warning: #d4a017;
        --logo-text: yellow;
      }

      html.light {
        --bg: #f5f0e3;
        --card: #fdfaef;
        --surface: #f5f0e3;
        --border: #d4c5a0;
        --border-rgb: 212, 197, 160;
        --accent: #c9a100;
        --accent-rgb: 201, 161, 0;
        --text: #2c2410;
        --muted: #8a7a5c;
        --success: #4a7c2e;
        --success-rgb: 74, 124, 46;
        --error: #b71c1c;
        --error-rgb: 183, 28, 28;
        --warning: #bd9223;
        --logo-text: black;
      }
    </style>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (!t)
          t = matchMedia("(prefers-color-scheme:light)").matches
            ? "light"
            : "dark";
        if (t === "light") document.documentElement.classList.add("light");
      })();
    </script>
  </head>
  <body>
    <hive-app></hive-app>
    <script type="module" src="./ui/index.ts"></script>
  </body>
</html>
