<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hive</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: monospace;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      :root {
        --bg: #0c0a00;
        --card: #0d0c06;
        --surface: #231c06;
        --border: #45370c;
        --border-rgb: 58, 46, 10;
        --accent: #f5b342;
        --accent-rgb: 245, 179, 66;
        --text: #f5e6c8;
        --muted: #8a7a5c;
        --success: #7cb342;
        --success-rgb: 124, 179, 66;
        --error: #d4451a;
        --error-rgb: 212, 69, 26;
        --warning: #d4a017;
      }

      html.light {
        --bg: #f5f0e3;
        --card: #fdfaef;
        --surface: #f5f0e3;
        --border: #d4c5a0;
        --border-rgb: 212, 197, 160;
        --accent: #1f1902;
        --accent-rgb: 31, 25, 2;
        --text: #2c2410;
        --muted: #8a7a5c;
        --success: #4a7c2e;
        --success-rgb: 74, 124, 46;
        --error: #b71c1c;
        --error-rgb: 183, 28, 28;
        --warning: #bd9223;
      }
    </style>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (!t)
          t = matchMedia("(prefers-color-scheme:light)").matches
            ? "light"
            : "dark";
        if (t === "light") document.documentElement.classList.add("light");
      })();
    </script>
  </head>
  <body>
    <hive-app></hive-app>
    <script type="module" src="./ui/index.ts"></script>
  </body>
</html>
