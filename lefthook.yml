pre-commit:
  jobs:
    - name: prettier
      run: npx prettier --ignore-unknown --write {staged_files} && git add {staged_files}
    - name: eslint
      glob: "*.{ts,js}"
      run: npx eslint --fix {staged_files} && git add {staged_files}
    - name: typecheck
      glob: "*.{ts,js}"
      run: npm run typecheck
